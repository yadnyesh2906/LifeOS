<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LifeOS - Orbit Settings</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Manrope:wght@600;700;800&family=JetBrains+Mono:wght@500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#0ea5e9",
                        "secondary-container": "#7ed4fd",
                        "surface": "#faf8ff",
                        "on-surface": "#131b2e",
                        "on-surface-variant": "#3e4850",
                        "primary": "#006591",
                        "outline-variant": "#bec8d2",
                        "surface-container": "#eaedff",
                        "secondary": "#006686",
                        "surface-container-high": "#e2e7ff",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-sm": ["JetBrains Mono"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-xl": ["Manrope"],
                        "headline-md": ["Manrope"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F8FAFC;
        }
        .ambient-shadow {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.04), 0 2px 10px -2px rgba(0, 0, 0, 0.02);
        }
    </style>
</head>
<body class="font-body-md text-on-surface">

    <!-- Top Navigation Bar -->
    <header class="bg-surface border-b border-surface-variant flex justify-between items-center px-lg py-sm w-full fixed top-0 z-50 shadow-sm">
        <div class="flex items-center gap-md">
            <div class="w-10 h-10 rounded-full overflow-hidden bg-primary-container flex items-center justify-center">
                <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAvYSKatxVfKBIONQASWRy9cZiXcW3_Px1SX2o0_yHSXsJAvJlt2xE9pKC-25GBgaeZ-5RUKM_wriYzHuG7EU8dT8_Gqc2PF9D0hb960XN6iuBjwDveD9iYcitXETb9hrqy7vSeO-oJwrCczflXu46ALaOa2tEJ8a2Q5F8RL6Igh-DpLVq8sP4_-ErY1icolMRaXqYotOHXjw7RXAX_3vb2rAe7r59Tx_yBl-8PhD5ezUd0WtW7_X4LGg"/>
            </div>
            <h1 class="font-headline-md text-headline-md font-bold text-primary">LifeOS</h1>
        </div>
        <div class="flex items-center gap-lg">
            <button onclick="window.location.href='orbit.html'" class="material-symbols-outlined text-primary hover:bg-surface-container-low p-2 rounded-full transition-colors duration-200">settings</button>
        </div>
    </header>

    <!-- Main Canvas -->
    <main class="max-w-max-width mx-auto pt-24 pb-32 px-md md:px-margin-desktop">
        <section class="mb-xl">
            <h2 class="font-headline-xl text-headline-xl text-on-surface">Orbit Controls</h2>
            <p class="text-on-surface-variant font-body-lg">Manage your credentials, milestones, and system profile settings.</p>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">
            <!-- Profile Info & Password Reset -->
            <div class="lg:col-span-6 bg-white border border-outline-variant p-lg rounded-xl ambient-shadow">
                <h4 class="font-headline-md text-headline-md mb-md text-primary font-bold">System Profile</h4>
                <div class="flex flex-col gap-2 mb-6 bg-surface-container-low p-4 rounded-xl border border-outline-variant">
                    <p class="font-body-md text-on-surface"><strong>Full Name:</strong> <span id="profile-name">Loading...</span></p>
                    <p class="font-body-md text-on-surface"><strong>Email:</strong> <span id="profile-email">Loading...</span></p>
                </div>
                
                <form id="change-pwd-form" class="flex flex-col gap-4 border-t border-outline-variant pt-6">
                    <h5 class="font-label-sm text-label-sm text-primary uppercase font-bold">Change Account Password</h5>
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-label-sm text-on-surface-variant">CURRENT PASSWORD</label>
                        <input id="pwd-curr" type="password" required class="w-full bg-surface-container-low border border-outline-variant p-3 rounded-lg focus:border-primary focus:outline-none" />
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-label-sm text-on-surface-variant">NEW PASSWORD</label>
                        <input id="pwd-new" type="password" required class="w-full bg-surface-container-low border border-outline-variant p-3 rounded-lg focus:border-primary focus:outline-none" />
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-label-sm text-on-surface-variant">CONFIRM NEW PASSWORD</label>
                        <input id="pwd-conf" type="password" required class="w-full bg-surface-container-low border border-outline-variant p-3 rounded-lg focus:border-primary focus:outline-none" />
                    </div>
                    <button type="submit" class="bg-primary text-on-primary py-3 px-6 rounded-full font-semibold transition-all hover:opacity-90 active:scale-95 text-center mt-2">
                        Update Password
                    </button>
                </form>
                
                <button onclick="performLogout()" class="w-full mt-6 bg-error-container text-on-error-container py-3 px-6 rounded-full font-semibold transition-all hover:opacity-90 active:scale-95 text-center">
                    Sign Out of Command Center
                </button>
            </div>

            <!-- Goals & Milestones tracker -->
            <div class="lg:col-span-6 bg-white border border-outline-variant p-lg rounded-xl ambient-shadow">
                <div class="flex justify-between items-center mb-md">
                    <h4 class="font-headline-md text-headline-md text-primary font-bold">Milestones & Goals</h4>
                    <button onclick="openGoalCreateModal()" class="text-primary hover:underline font-label-sm text-label-sm flex items-center gap-1">
                        <span class="material-symbols-outlined text-[16px]">add</span> Add Goal
                    </button>
                </div>
                <div class="flex flex-col gap-4" id="goals-list"></div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-sm py-xs pb-safe bg-surface border-t border-surface-variant shadow-sm">
        <a class="flex flex-col items-center justify-center text-on-surface-variant px-md py-xs hover:text-primary transition-transform duration-150 scale-95 active:scale-90" href="nexus.html">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="font-label-sm text-label-sm">Nexus</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant px-md py-xs hover:text-primary transition-transform duration-150 scale-95 active:scale-90" href="tasks.html">
            <span class="material-symbols-outlined">check_circle</span>
            <span class="font-label-sm text-label-sm">Tasks</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant px-md py-xs hover:text-primary transition-transform duration-150 scale-95 active:scale-90" href="pulse.html">
            <span class="material-symbols-outlined">favorite</span>
            <span class="font-label-sm text-label-sm">Pulse</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant px-md py-xs hover:text-primary transition-transform duration-150 scale-95 active:scale-90" href="vault.html">
            <span class="material-symbols-outlined">description</span>
            <span class="font-label-sm text-label-sm">Vault</span>
        </a>
        <a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-md py-xs transition-transform duration-150 scale-95 active:scale-90" href="orbit.html">
            <span class="material-symbols-outlined">settings</span>
            <span class="font-label-sm text-label-sm">Orbit</span>
        </a>
    </nav>

    <script>
        const API_BASE_URL = 'http://localhost:8081/api';

        // Check Auth
        const token = localStorage.getItem('jwt_token');
        if (!token) {
            window.location.href = 'index.html';
        }

        async function fetchWithAuth(url, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
                ...options.headers
            };
            const response = await fetch(url, { ...options, headers });
            if (response.status === 401) {
                localStorage.removeItem('jwt_token');
                window.location.href = 'index.html';
                throw new Error('Unauthorized');
            }
            return response.json();
        }

        async function loadProfile() {
            try {
                const profile = await fetchWithAuth(`${API_BASE_URL}/users/profile`);
                if (profile) {
                    document.getElementById('profile-name').textContent = profile.fullName;
                    document.getElementById('profile-email').textContent = profile.email;
                }
            } catch(e){}
        }

        async function loadGoals() {
            const list = document.getElementById('goals-list');
            list.innerHTML = '';
            try {
                const res = await fetchWithAuth(`${API_BASE_URL}/goals`);
                if (res.success && res.data) {
                    res.data.forEach(goal => {
                        const item = document.createElement('div');
                        item.className = `border border-outline-variant p-4 rounded-xl flex items-center justify-between ${goal.completed ? 'opacity-50 bg-surface-container-low' : 'bg-white'}`;
                        item.innerHTML = `
                            <div>
                                <h5 class="font-body-lg font-semibold ${goal.completed ? 'line-through' : ''}">${goal.title}</h5>
                                <p class="font-body-sm text-on-surface-variant line-clamp-1">${goal.description || ''}</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="toggleGoal(${goal.id}, ${goal.completed})" class="material-symbols-outlined text-primary hover:scale-110 transition-transform">
                                    ${goal.completed ? 'check_box' : 'check_box_outline_blank'}
                                </button>
                                <button onclick="deleteGoal(${goal.id})" class="material-symbols-outlined text-error hover:scale-110 transition-transform">delete</button>
                            </div>
                        `;
                        list.appendChild(item);
                    });
                }
            } catch(e){}
        }

        async function toggleGoal(id, completed) {
            try {
                const res = await fetchWithAuth(`${API_BASE_URL}/goals/${id}/${completed ? 'pending' : 'complete'}`, {
                    method: 'PATCH'
                });
                if (res.success) loadGoals();
            } catch(e){}
        }

        async function deleteGoal(id) {
            if (confirm('Delete this goal milestone?')) {
                try {
                    const res = await fetchWithAuth(`${API_BASE_URL}/goals/${id}`, { method: 'DELETE' });
                    if (res.success) loadGoals();
                } catch(e){}
            }
        }

        async function openGoalCreateModal() {
            const title = prompt("Enter Goal Target Title:");
            if (!title) return;
            const description = prompt("Enter Description:");

            try {
                const res = await fetchWithAuth(`${API_BASE_URL}/goals`, {
                    method: 'POST',
                    body: JSON.stringify({
                        title,
                        description,
                        targetDate: new Date().toISOString(),
                        completed: false
                    })
                });
                if (res.success) loadGoals();
            } catch (err) {}
        }

        function performLogout() {
            if (confirm('Log out from LifeOS?')) {
                localStorage.removeItem('jwt_token');
                window.location.href = 'index.html';
            }
        }

        // Bind Change Password
        document.getElementById('change-pwd-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentPassword = document.getElementById('pwd-curr').value;
            const newPassword = document.getElementById('pwd-new').value;
            const confirmPassword = document.getElementById('pwd-conf').value;

            try {
                const res = await fetch(`${API_BASE_URL}/users/change-password`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ currentPassword, newPassword, confirmPassword })
                });
                if (res.status === 200) {
                    alert('Password updated successfully!');
                    document.getElementById('change-pwd-form').reset();
                } else {
                    const text = await res.text();
                    alert(text || 'Password update failed.');
                }
            } catch(err){
                alert('Connection error.');
            }
        });

        loadProfile();
        loadGoals();
    </script>
</body>
</html>
