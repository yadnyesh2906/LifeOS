<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LifeOS - Knowledge Vault</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Manrope:wght@600;700;800&family=JetBrains+Mono:wght@500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#0ea5e9",
                        "secondary-container": "#7ed4fd",
                        "surface": "#faf8ff",
                        "on-surface": "#131b2e",
                        "on-surface-variant": "#3e4850",
                        "primary": "#006591",
                        "outline-variant": "#bec8d2",
                        "surface-container": "#eaedff",
                        "secondary": "#006686",
                        "surface-container-high": "#e2e7ff",
                        "error": "#ba1a1a"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F8FAFC;
        }
        .ambient-shadow {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.04), 0 2px 10px -2px rgba(0, 0, 0, 0.02);
        }
    </style>
</head>
<body class="font-sans text-base text-on-surface">

    <!-- Top Navigation Bar -->
    <header class="bg-surface border-b border-surface-variant flex justify-between items-center px-6 py-4 w-full fixed top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full overflow-hidden bg-primary-container flex items-center justify-center">
                <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAvYSKatxVfKBIONQASWRy9cZiXcW3_Px1SX2o0_yHSXsJAvJlt2xE9pKC-25GBgaeZ-5RUKM_wriYzHuG7EU8dT8_Gqc2PF9D0hb960XN6iuBjwDveD9iYcitXETb9hrqy7vSeO-oJwrCczflXu46ALaOa2tEJ8a2Q5F8RL6Igh-DpLVq8sP4_-ErY1icolMRaXqYotOHXjw7RXAX_3vb2rAe7r59Tx_yBl-8PhD5ezUd0WtW7_X4LGg"/>
            </div>
            <h1 class="text-xl md:text-2xl font-bold text-primary tracking-tight">LifeOS</h1>
        </div>
        <div class="flex items-center gap-6">
            <button onclick="window.location.href='orbit.html'" class="material-symbols-outlined text-primary hover:bg-surface-container-low p-2 rounded-full transition-colors duration-200">settings</button>
        </div>
    </header>

    <!-- Main Canvas -->
    <main class="max-w-[1440px] mx-auto pt-28 pb-32 px-6 md:px-16">
        <section class="mb-10">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-3xl md:text-4xl font-extrabold text-on-surface tracking-tight mb-2">The Vault</h2>
                    <p class="text-on-surface-variant text-lg">Manage your personal database of notes and diary entries.</p>
                </div>
            </div>
        </section>

        <div class="flex gap-2 mb-8 bg-surface-container p-1 rounded-full w-fit border border-outline-variant">
            <button id="vault-tab-notes" onclick="toggleVaultSubTab('notes')" class="px-6 py-2 rounded-full text-xs font-mono bg-primary text-on-primary">Notes</button>
            <button id="vault-tab-journals" onclick="toggleVaultSubTab('journals')" class="px-6 py-2 rounded-full text-xs font-mono text-on-surface-variant">Journals</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="vault-items-grid"></div>
    </main>

    <!-- FAB for Note/Journal Creation -->
    <button onclick="openVaultCreateModal()" class="fixed bottom-24 right-8 w-14 h-14 bg-primary text-white rounded-full shadow-lg flex items-center justify-center hover:scale-110 active:scale-95 transition-transform duration-200 z-50">
        <span class="material-symbols-outlined text-[32px]">add</span>
    </button>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-surface border-t border-surface-variant shadow-sm">
        <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:text-primary transition-all scale-95" href="nexus.html">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-xs font-mono">Nexus</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:text-primary transition-all scale-95" href="tasks.html">
            <span class="material-symbols-outlined">check_circle</span>
            <span class="text-xs font-mono">Tasks</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:text-primary transition-all scale-95" href="pulse.html">
            <span class="material-symbols-outlined">favorite</span>
            <span class="text-xs font-mono">Pulse</span>
        </a>
        <a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-6 py-2 transition-all scale-95" href="vault.html">
            <span class="material-symbols-outlined">description</span>
            <span class="text-xs font-mono">Vault</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:text-primary transition-all scale-95" href="orbit.html">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-xs font-mono">Orbit</span>
        </a>
    </nav>

    <script>
        const API_BASE_URL = 'http://localhost:8081/api';

        const token = localStorage.getItem('jwt_token');
        if (!token) {
            window.location.href = 'index.html';
        }

        async function fetchWithAuth(url, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
                ...options.headers
            };
            const response = await fetch(url, { ...options, headers });
            if (response.status === 401) {
                localStorage.removeItem('jwt_token');
                window.location.href = 'index.html';
                throw new Error('Unauthorized');
            }
            return response.json();
        }

        let activeVaultSubTab = 'notes';
        async function toggleVaultSubTab(tab) {
            activeVaultSubTab = tab;
            const btnNotes = document.getElementById('vault-tab-notes');
            const btnJournals = document.getElementById('vault-tab-journals');
            
            if (tab === 'notes') {
                btnNotes.className = "px-6 py-2 rounded-full text-xs font-mono bg-primary text-on-primary";
                btnJournals.className = "px-6 py-2 rounded-full text-xs font-mono text-on-surface-variant hover:bg-primary/5";
                await loadVaultNotes();
            } else {
                btnNotes.className = "px-6 py-2 rounded-full text-xs font-mono text-on-surface-variant hover:bg-primary/5";
                btnJournals.className = "px-6 py-2 rounded-full text-xs font-mono bg-primary text-on-primary";
                await loadVaultJournals();
            }
        }

        async function loadVaultNotes() {
            const grid = document.getElementById('vault-items-grid');
            grid.innerHTML = '';
            try {
                const res = await fetchWithAuth(`${API_BASE_URL}/notes`);
                if (res.success && res.data) {
                    res.data.forEach(note => {
                        const card = document.createElement('div');
                        card.className = `bg-white border border-outline-variant p-6 rounded-xl ambient-shadow flex flex-col justify-between min-h-[180px]`;
                        card.innerHTML = `
                            <div>
                                <h4 class="text-lg font-bold text-on-surface mb-2">${note.title}</h4>
                                <p class="text-on-surface-variant text-sm line-clamp-3">${note.content || ''}</p>
                            </div>
                            <div class="flex items-center justify-between mt-4 border-t border-outline-variant pt-3">
                                <button onclick="deleteNote(${note.id})" class="text-error hover:text-red-700 flex items-center gap-1 text-xs font-mono">
                                    <span class="material-symbols-outlined text-[16px]">delete</span> Delete
                                </button>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch(e){}
        }

        async function deleteNote(id) {
            if (confirm('Delete this note?')) {
                try {
                    const res = await fetchWithAuth(`${API_BASE_URL}/notes/${id}`, { method: 'DELETE' });
                    if (res.success) loadVaultNotes();
                } catch(e){}
            }
        }

        async function loadVaultJournals() {
            const grid = document.getElementById('vault-items-grid');
            grid.innerHTML = '';
            try {
                const res = await fetchWithAuth(`${API_BASE_URL}/journals`);
                if (res.success && res.data) {
                    res.data.forEach(journal => {
                        const card = document.createElement('div');
                        card.className = `bg-white border border-outline-variant p-6 rounded-xl ambient-shadow flex flex-col justify-between min-h-[180px]`;
                        card.innerHTML = `
                            <div>
                                <h4 class="text-lg font-bold text-on-surface mb-2">${journal.title}</h4>
                                <p class="text-on-surface-variant text-sm line-clamp-3">${journal.content || ''}</p>
                            </div>
                            <div class="flex items-center justify-between mt-4 border-t border-outline-variant pt-3">
                                <button onclick="deleteJournal(${journal.id})" class="text-error hover:text-red-700 flex items-center gap-1 text-xs font-mono">
                                    <span class="material-symbols-outlined text-[16px]">delete</span> Delete
                                </button>
                                <span class="text-xs font-mono text-on-surface-variant">
                                    ${journal.createdAt ? new Date(journal.createdAt).toLocaleDateString() : ''}
                                </span>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch(e){}
        }

        async function deleteJournal(id) {
            if (confirm('Delete this journal?')) {
                try {
                    const res = await fetchWithAuth(`${API_BASE_URL}/journals/${id}`, { method: 'DELETE' });
                    if (res.success) loadVaultJournals();
                } catch(e){}
            }
        }

        async function openVaultCreateModal() {
            const title = prompt(`Enter ${activeVaultSubTab === 'notes' ? 'Note' : 'Journal'} Title:`);
            if (!title) return;
            const content = prompt("Enter Content:");

            try {
                const endpoint = activeVaultSubTab === 'notes' ? 'notes' : 'journals';
                const res = await fetchWithAuth(`${API_BASE_URL}/${endpoint}`, {
                    method: 'POST',
                    body: JSON.stringify({ title, content })
                });
                if (res.success) {
                    if (activeVaultSubTab === 'notes') await loadVaultNotes();
                    else await loadVaultJournals();
                }
            } catch (err) {}
        }

        toggleVaultSubTab('notes');
    </script>
</body>
</html>
