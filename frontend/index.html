<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LifeOS - Entry Center</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Manrope:wght@600;700;800&family=JetBrains+Mono:wght@500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#006591",
                        surface: "#faf8ff",
                        "on-surface": "#131b2e",
                        "on-surface-variant": "#3e4850",
                        "surface-container-low": "#f2f3ff",
                        "outline-variant": "#bec8d2"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F8FAFC;
        }
        .ambient-shadow {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.04), 0 2px 10px -2px rgba(0, 0, 0, 0.02);
        }
    </style>
</head>
<body class="font-sans text-base min-h-screen flex items-center justify-center p-4">

    <div class="bg-white border border-outline-variant p-6 md:p-8 max-w-md w-full rounded-2xl ambient-shadow">
        <h2 class="text-3xl font-extrabold text-primary text-center mb-2 tracking-tight" id="auth-title">Welcome to LifeOS</h2>
        <p class="text-base text-on-surface-variant text-center mb-6" id="auth-subtitle">Login to enter your command center</p>
        
        <form id="auth-form" class="flex flex-col gap-4">
            <div class="flex flex-col gap-1" id="fullname-container" style="display: none;">
                <label class="text-xs font-mono tracking-wider uppercase text-on-surface-variant">FULL NAME</label>
                <input id="auth-fullname" type="text" class="w-full bg-surface-container-low border border-outline-variant p-3 rounded-lg focus:border-primary focus:outline-none" placeholder="Vedant Sonawane" />
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs font-mono tracking-wider uppercase text-on-surface-variant">EMAIL ADDRESS</label>
                <input id="auth-email" type="email" required class="w-full bg-surface-container-low border border-outline-variant p-3 rounded-lg focus:border-primary focus:outline-none" placeholder="vedant@example.com" />
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs font-mono tracking-wider uppercase text-on-surface-variant">PASSWORD</label>
                <input id="auth-password" type="password" required class="w-full bg-surface-container-low border border-outline-variant p-3 rounded-lg focus:border-primary focus:outline-none" placeholder="••••••••" />
            </div>
            <button type="submit" class="bg-primary text-on-primary py-3 px-6 rounded-full font-semibold transition-all hover:opacity-90 active:scale-95 mt-2">
                Continue
            </button>
        </form>
        
        <p class="text-center text-xs font-mono text-on-surface-variant mt-6">
            <span id="auth-toggle-text">New to LifeOS?</span>
            <button id="auth-toggle-btn" class="text-primary font-semibold hover:underline ms-1">Create an account</button>
        </p>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8081/api';

        if (localStorage.getItem('jwt_token')) {
            window.location.href = 'nexus.html';
        }

        let isLogin = true;
        const toggleBtn = document.getElementById('auth-toggle-btn');
        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            document.getElementById('fullname-container').style.display = isLogin ? 'none' : 'flex';
            document.getElementById('auth-title').textContent = isLogin ? 'Welcome to LifeOS' : 'Create Account';
            document.getElementById('auth-subtitle').textContent = isLogin ? 'Login to enter your command center' : 'Get started for free';
            toggleBtn.textContent = isLogin ? 'Create an account' : 'Login';
            document.getElementById('auth-toggle-text').textContent = isLogin ? 'New to LifeOS?' : 'Already have an account?';
        });

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;

            if (isLogin) {
                try {
                    const res = await fetch(`${API_BASE_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const result = await res.json();
                    if (result.success) {
                        localStorage.setItem('jwt_token', result.data.token);
                        window.location.href = 'nexus.html';
                    } else {
                        alert(result.message || 'Login failed');
                    }
                } catch (err) {
                    alert('Server connection error. Is the backend running on port 8081?');
                }
            } else {
                const fullName = document.getElementById('auth-fullname').value;
                try {
                    const res = await fetch(`${API_BASE_URL}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fullName, email, password })
                    });
                    const result = await res.json();
                    if (result.success) {
                        alert('Registration successful! Please login.');
                        toggleBtn.click();
                    } else {
                        alert(result.message || 'Registration failed');
                    }
                } catch (err) {
                    alert('Server connection error.');
                }
            }
        });
    </script>
</body>
</html>
