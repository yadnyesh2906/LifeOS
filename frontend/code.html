                        "surface-container-lowest": "#ffffff",
                        "secondary": "#006686",
                        "on-primary-container": "#003751",
                        "surface": "#faf8ff",
                        "secondary-fixed-dim": "#7bd1fa",
                        "surface-tint": "#006591",
                        "on-tertiary-fixed": "#141d21",
                        "tertiary-container": "#949da3",
                        "inverse-surface": "#283044",
                        "surface-container": "#eaedff",
                        "surface-container-high": "#e2e7ff",
                        "surface-dim": "#d2d9f4",

                        "primary": "#006591",
                        "outline": "#6e7881",
                        "on-tertiary-container": "#2c3539",
                        "on-primary-fixed": "#001e2f",
                        "on-surface-variant": "#3e4850",
                        "tertiary-fixed-dim": "#bfc8ce",
                        "background": "#faf8ff",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#c0e8ff",
                        "surface-bright": "#faf8ff",
                        "on-surface": "#131b2e",
                        "primary-container": "#0ea5e9",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#c9e6ff",
                        "surface-container-highest": "#dae2fd",
                        "secondary-container": "#7ed4fd",

                        "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
    <style>
        .task-card-enter {
            animation: slideIn 0.4s ease-out forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .checked-task {
            text-decoration: line-through;
            opacity: 0.6;
            transition: all 0.3s ease;
        }
        .ambient-shadow {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.04), 0 2px 10px -2px rgba(0, 0, 0, 0.02);
        }
        body {
            background-color: #F8FAFC;
        }
    </style>
</head>
<body class="font-body-md text-on-surface selection:bg-primary-fixed">

    <!-- Top Navigation Bar -->
    <header class="bg-surface border-b border-surface-variant flex justify-between items-center px-lg py-sm w-full fixed top-0 z-50 shadow-sm">
        <div class="flex items-center gap-md">
            <div class="w-10 h-10 rounded-full overflow-hidden bg-primary-container flex items-center justify-center">
                <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAvYSKatxVfKBIONQASWRy9cZiXcW3_Px1SX2o0_yHSXsJAvJlt2xE9pKC-25GBgaeZ-5RUKM_wriYzHuG7EU8dT8_Gqc2PF9D0hb960XN6iuBjwDveD9iYcitXETb9hrqy7vSeO-oJwrCczflXu46ALaOa2tEJ8a2Q5F8RL6Igh-DpLVq8sP4_-ErY1icolMRaXqYotOHXjw7RXAX_3vb2rAe7r59Tx_yBl-8PhD5ezUd0WtW7_X4LGg"/>
            </div>
            <h1 class="font-headline-md text-headline-md font-bold text-primary">LifeOS</h1>
        </div>
        <div class="flex items-center gap-lg">
            <button onclick="changeTab('orbit')" class="material-symbols-outlined text-primary hover:bg-surface-container-low p-2 rounded-full transition-colors duration-200">settings</button>
        </div>
    </header>

    <!-- Main Dynamic Canvas -->
    <main id="main-content" class="max-w-max-width mx-auto pt-24 pb-32 px-md md:px-margin-desktop">
        <!-- Renders via JS -->
    </main>

    <!-- FAB for Quick Actions -->
    <button onclick="openQuickCreateModal()" class="fixed bottom-24 right-8 w-14 h-14 bg-primary text-white rounded-full shadow-lg flex items-center justify-center hover:scale-110 active:scale-95 transition-transform duration-200 z-50">
        <span class="material-symbols-outlined text-[32px]">add</span>
    </button>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-sm py-xs pb-safe bg-surface border-t border-surface-variant shadow-sm">
        <button onclick="changeTab('nexus')" id="nav-btn-nexus" class="flex flex-col items-center justify-center text-on-surface-variant px-md py-xs hover:text-primary transition-all scale-95 active:scale-90">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="font-label-sm text-label-sm">Nexus</span>
        </button>
        <button onclick="changeTab('tasks')" id="nav-btn-tasks" class="flex flex-col items-center justify-center text-on-surface-variant px-md py-xs hover:text-primary transition-all scale-95 active:scale-90">
            <span class="material-symbols-outlined">check_circle</span>
            <span class="font-label-sm text-label-sm">Tasks</span>
        </button>
        <button onclick="changeTab('pulse')" id="nav-btn-pulse" class="flex flex-col items-center justify-center text-on-surface-variant px-md py-xs hover:text-primary transition-all scale-95 active:scale-90">
            <span class="material-symbols-outlined">favorite</span>
            <span class="font-label-sm text-label-sm">Pulse</span>
        </button>
        <button onclick="changeTab('vault')" id="nav-btn-flows" class="flex flex-col items-center justify-center text-on-surface-variant px-md py-xs hover:text-primary transition-all scale-95 active:scale-90">
            <span class="material-symbols-outlined">description</span>
            <span class="font-label-sm text-label-sm">Vault</span>
        </button>
        <button onclick="changeTab('orbit')" id="nav-btn-orbit" class="flex flex-col items-center justify-center text-on-surface-variant px-md py-xs hover:text-primary transition-all scale-95 active:scale-90">
            <span class="material-symbols-outlined">settings</span>
            <span class="font-label-sm text-label-sm">Orbit</span>
        </button>
    </nav>

    <script>
        const API_BASE_URL = 'http://localhost:8081/api';
        let currentTab = 'tasks';

        // Check Auth
        function checkAuth() {
            const token = localStorage.getItem('jwt_token');
            if (!token) {
                showAuthModal();
            } else {
                hideAuthModal();
                renderActiveTab();
            }
        }

        // Show Auth Overlay
        function showAuthModal() {
            let modal = document.getElementById('auth-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'auth-modal';
                modal.className = 'fixed inset-0 bg-surface/95 backdrop-blur-2xl z-[100] flex items-center justify-center p-4';
                modal.innerHTML = `
                    <div class="bg-white border border-outline-variant p-8 max-w-md w-full rounded-2xl ambient-shadow">
                        <h2 class="font-headline-lg text-headline-lg text-primary text-center mb-2" id="auth-title">Welcome to LifeOS</h2>
                        <p class="font-body-md text-on-surface-variant text-center mb-6" id="auth-subtitle">Login to enter your command center</p>
                        
                        <form id="auth-form" class="flex flex-col gap-4">
                            <div class="flex flex-col gap-1" id="fullname-container" style="display: none;">
                                <label class="font-label-sm text-label-sm text-on-surface-variant">FULL NAME</label>
                                <input id="auth-fullname" type="text" class="w-full bg-surface-container-low border border-outline-variant p-3 rounded-lg focus:border-primary focus:outline-none" placeholder="Vedant Sonawane" />
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="font-label-sm text-label-sm text-on-surface-variant">EMAIL ADDRESS</label>
                                <input id="auth-email" type="email" required class="w-full bg-surface-container-low border border-outline-variant p-3 rounded-lg focus:border-primary focus:outline-none" placeholder="vedant@example.com" />
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="font-label-sm text-label-sm text-on-surface-variant">PASSWORD</label>
                                <input id="auth-password" type="password" required class="w-full bg-surface-container-low border border-outline-variant p-3 rounded-lg focus:border-primary focus:outline-none" placeholder="••••••••" />
                            </div>
                            <button type="submit" class="bg-primary text-on-primary py-3 px-6 rounded-full font-semibold transition-all hover:opacity-90 active:scale-95 glow-active mt-2">
                                Continue
                            </button>
                        </form>
                        
                        <p class="text-center font-label-sm text-on-surface-variant mt-6">
                            <span id="auth-toggle-text">New to LifeOS?</span>
                            <button id="auth-toggle-btn" class="text-primary font-semibold hover:underline ms-1">Create an account</button>
                        </p>
                    </div>
                `;
                document.body.appendChild(modal);

                let isLogin = true;
                const toggleBtn = document.getElementById('auth-toggle-btn');
                toggleBtn.addEventListener('click', () => {
                    isLogin = !isLogin;
                    document.getElementById('fullname-container').style.display = isLogin ? 'none' : 'flex';
                    document.getElementById('auth-title').textContent = isLogin ? 'Welcome to LifeOS' : 'Create Account';
                    document.getElementById('auth-subtitle').textContent = isLogin ? 'Login to enter your command center' : 'Get started for free';
                    toggleBtn.textContent = isLogin ? 'Create an account' : 'Login';
                    document.getElementById('auth-toggle-text').textContent = isLogin ? 'New to LifeOS?' : 'Already have an account?';
                });

                document.getElementById('auth-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('auth-email').value;
                    const password = document.getElementById('auth-password').value;

                    if (isLogin) {
                        try {
                            const res = await fetch(`${API_BASE_URL}/auth/login`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email, password })
                            });
                            const result = await res.json();
                            if (result.success) {
                                localStorage.setItem('jwt_token', result.data.token);
                                checkAuth();
                            } else {
                                alert(result.message || 'Login failed');
                            }
                        } catch (err) {
                            alert('Server connection error. Is the backend running on port 8081?');
                        }
                    } else {
                        const fullName = document.getElementById('auth-fullname').value;
                        try {
                            const res = await fetch(`${API_BASE_URL}/auth/register`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ fullName, email, password })
                            });
                            const result = await res.json();
                            if (result.success) {
                                alert('Registration successful! Please login.');
                                toggleBtn.click();
                            } else {
                                alert(result.message || 'Registration failed');
                            }
                        } catch (err) {
                            alert('Server connection error.');
                        }
                    }
                });
            }
            modal.style.display = 'flex';
        }

        function hideAuthModal() {
            const modal = document.getElementById('auth-modal');
            if (modal) modal.style.display = 'none';
        }

        // Authenticated Request Fetcher Wrapper
        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('jwt_token');
            const headers = {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
                ...options.headers
            };
            const response = await fetch(url, { ...options, headers });
            if (response.status === 401) {
                localStorage.removeItem('jwt_token');
                checkAuth();
                throw new Error('Unauthorized');
            }
            return response.json();
        }

        // Switch Navigation Tab
        function changeTab(tabName) {
            currentTab = tabName;
            renderActiveTab();
        }

        // Render Active Tab View
        async function renderActiveTab() {
            const tabs = ['nexus', 'tasks', 'pulse', 'flows', 'orbit'];
            tabs.forEach(t => {
                const btn = document.getElementById(`nav-btn-${t === 'flows' ? 'flows' : t}`);
                if (btn) {
                    if (t === currentTab) {
                        btn.className = "flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-md py-xs transition-transform duration-150 scale-95 active:scale-90";
                    } else {
                        btn.className = "flex flex-col items-center justify-center text-on-surface-variant px-md py-xs hover:text-primary transition-transform duration-150 scale-95 active:scale-90";
                    }
                }
            });

            const mainContent = document.getElementById('main-content');
            if (!mainContent) return;

            mainContent.innerHTML = `
                <div class="flex items-center justify-center py-20">
                    <p class="font-headline-md text-primary animate-pulse">Loading command center module...</p>
                </div>
            `;

            try {
                if (currentTab === 'tasks') {
                    await renderTasksView(mainContent);
                } else if (currentTab === 'nexus') {
                    await renderNexusView(mainContent);
                } else if (currentTab === 'pulse') {
                    await renderPulseView(mainContent);
                } else if (currentTab === 'flows') {
                    await renderFlowsView(mainContent);
                } else if (currentTab === 'orbit') {
                    await renderOrbitView(mainContent);
                }
            } catch (err) {
                mainContent.innerHTML = `<p class="text-error text-center py-10">Error loading tab content.</p>`;
            }
        }

        // ==========================================
        // MODULE: NEXUS (DASHBOARD & MOOD)
        // ==========================================
        async function renderNexusView(container) {
            let stats = {
                totalTasks: 0, completedTasks: 0, totalHabits: 0, 
                totalGoals: 0, completedGoals: 0, totalNotes: 0, 
                totalJournals: 0, totalReminders: 0, todayMood: 'Not Logged'
            };

            try {
                const res = await fetchWithAuth(`${API_BASE_URL}/dashboard`);
                if (res.success && res.data) stats = res.data;
            } catch(e){}

            const completionPercent = stats.totalTasks > 0 ? Math.round((stats.completedTasks / stats.totalTasks) * 100) : 0;

            container.innerHTML = `
                <section class="mb-xl">
                    <div class="flex flex-col md:flex-row md:items-end justify-between gap-md">
                        <div>
                            <h2 class="font-headline-xl text-headline-xl text-on-surface">Daily Pulse</h2>
                            <p class="text-on-surface-variant font-body-lg">You have ${stats.totalTasks - stats.completedTasks} pending tasks remaining today.</p>
                        </div>
                        <div class="flex gap-sm">
                            <div class="bg-white border border-outline-variant p-md rounded-xl ambient-shadow flex items-center gap-md">
                                <div class="w-2 h-12 bg-primary-container rounded-full"></div>
                                <div>
                                    <p class="font-label-sm text-label-sm text-on-surface-variant">COMPLETION</p>
                                    <p class="font-headline-md text-headline-md">${completionPercent}%</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter">
                    <!-- Mood Log Card -->
                    <div class="bg-white border border-outline-variant p-lg rounded-xl ambient-shadow flex flex-col justify-between">
                        <div>
                            <h4 class="font-headline-md text-body-lg text-on-surface mb-xs">Today's Mood: ${stats.todayMood || 'Not Logged'}</h4>
                            <p class="text-on-surface-variant font-body-sm mb-md">Tap to update your current diagnostics.</p>
                            <div class="flex gap-2 flex-wrap">
                                <button onclick="submitMood('Excellent')" class="px-3 py-1 bg-surface-container text-primary rounded-full hover:bg-primary hover:text-white transition-all font-label-sm">Excellent</button>
                                <button onclick="submitMood('Good')" class="px-3 py-1 bg-surface-container text-primary rounded-full hover:bg-primary hover:text-white transition-all font-label-sm">Good</button>
                                <button onclick="submitMood('Neutral')" class="px-3 py-1 bg-surface-container text-primary rounded-full hover:bg-primary hover:text-white transition-all font-label-sm">Neutral</button>
                                <button onclick="submitMood('Bad')" class="px-3 py-1 bg-surface-container text-primary rounded-full hover:bg-primary hover:text-white transition-all font-label-sm">Bad</button>
                                <button onclick="submitMood('Awful')" class="px-3 py-1 bg-surface-container text-primary rounded-full hover:bg-primary hover:text-white transition-all font-label-sm">Awful</button>
                            </div>
                        </div>
                    </div>

                    <!-- Habits streak summary card -->
                    <div class="bg-white border border-outline-variant p-lg rounded-xl ambient-shadow flex flex-col justify-between">
                        <div>
                            <h4 class="font-headline-md text-body-lg text-on-surface mb-xs">Active Habits</h4>
                            <p class="text-on-surface-variant font-body-sm mb-md">Routines loaded and ready for check-in.</p>
                            <p class="text-4xl font-headline-xl text-primary">${stats.totalHabits} Habits</p>
                        </div>
                    </div>

                    <!-- Vault Summary Card -->
                    <div class="bg-white border border-outline-variant p-lg rounded-xl ambient-shadow flex flex-col justify-between">
                        <div>
                            <h4 class="font-headline-md text-body-lg text-on-surface mb-xs">Knowledge Vault</h4>
                            <p class="text-on-surface-variant font-body-sm mb-md">Notes and journal files tracked in memory.</p>
                            <p class="text-4xl font-headline-xl text-secondary">${stats.totalNotes} Notes / ${stats.totalJournals} Journals</p>
                        </div>
                    </div>
                </div>
            `;
        }

        async function submitMood(val) {
            try {
                const res = await fetchWithAuth(`${API_BASE_URL}/moods`, {
                    method: 'POST',
                    body: JSON.stringify({ moodValue: val, notes: 'Logged from Nexus Dashboard' })
                });
                if (res.success) renderActiveTab();
            } catch(e){}
        }

        // ==========================================
        // MODULE: TASKS VIEW (3-COLUMN LAYOUT)
        // ==========================================
        async function renderTasksView(container) {
            container.innerHTML = `
                <section class="mb-xl">
                    <h2 class="font-headline-xl text-headline-xl text-on-surface">Daily Tasks</h2>
                    <p class="text-on-surface-variant font-body-lg">Manage your tasks, deadlines, and milestone progress.</p>
                </section>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">
                    <!-- Column 1: Active -->
                    <section class="lg:col-span-4 flex flex-col gap-md">
                        <div class="flex items-center justify-between mb-xs">
                            <h3 class="font-headline-md text-headline-md flex items-center gap-sm">
                                <span class="w-2 h-2 rounded-full bg-primary"></span>
                                Active
                            </h3>
                            <span class="font-label-sm text-label-sm bg-primary-container text-on-primary-container px-sm py-1 rounded-full" id="active-task-count">0 TASKS</span>
                        </div>
                        <div class="flex flex-col gap-md" id="active-tasks-list"></div>
                    </section>

                    <!-- Column 2: Upcoming -->
                    <section class="lg:col-span-4 flex flex-col gap-md">
                        <div class="flex items-center justify-between mb-xs">
                            <h3 class="font-headline-md text-headline-md flex items-center gap-sm">
                                <span class="w-2 h-2 rounded-full bg-secondary"></span>
                                Upcoming
                            </h3>
                            <span class="font-label-sm text-label-sm bg-surface-container-high text-on-surface-variant px-sm py-1 rounded-full" id="upcoming-task-count">0 TASKS</span>
                        </div>
                        <div class="flex flex-col gap-md" id="upcoming-tasks-list"></div>
                    </section>

                    <!-- Column 3: Completed -->
                    <section class="lg:col-span-4 flex flex-col gap-md">
                        <div class="flex items-center justify-between mb-xs">
                            <h3 class="font-headline-md text-headline-md flex items-center gap-sm">
                                <span class="w-2 h-2 rounded-full bg-outline-variant"></span>
                                Completed
                            </h3>
                            <button onclick="clearCompletedTasks()" class="font-label-sm text-label-sm text-primary hover:underline">CLEAR ALL</button>
                        </div>
                        <div class="flex flex-col gap-md opacity-70" id="completed-tasks-list"></div>
                    </section>
                </div>
            `;

            try {
                const res = await fetchWithAuth(`${API_BASE_URL}/tasks`);
                if (res.success && res.data) {
                    const activeList = document.getElementById('active-tasks-list');
                    const upcomingList = document.getElementById('upcoming-tasks-list');
                    const completedList = document.getElementById('completed-tasks-list');

                    let activeCount = 0;
                    let upcomingCount = 0;

                    res.data.forEach(task => {
                        const card = document.createElement('div');
                        card.className = `bg-white border border-outline-variant p-lg rounded-xl ambient-shadow hover:border-primary transition-all duration-300 group cursor-pointer task-card-enter`;
                        
                        if (task.completed) {
                            card.innerHTML = `
                                <div class="flex items-start justify-between">
                                    <h4 class="font-headline-md text-body-lg text-on-surface line-through">${task.title}</h4>
                                    <button onclick="toggleTaskCompletion(${task.id}, true)" class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</button>
                                </div>
                                <p class="text-on-surface-variant font-body-sm mt-2">${task.description || ''}</p>
                                <button onclick="deleteTask(${task.id})" class="text-error hover:text-red-700 flex items-center gap-1 font-label-sm text-label-sm mt-3">
                                    <span class="material-symbols-outlined text-[16px]">delete</span> Remove
                                </button>
                            `;
                            completedList.appendChild(card);
                        } else {
                            // Categorize Active vs Upcoming
                            const isUpcoming = task.dueDate && new Date(task.dueDate) > new Date(new Date().setHours(23, 59, 59, 999));
                            
                            card.innerHTML = `
                                <div class="flex items-start justify-between mb-sm">
                                    <h4 class="font-headline-md text-body-lg text-on-surface group-hover:text-primary transition-colors">${task.title}</h4>
                                    <input onclick="toggleTaskCompletion(${task.id}, false)" class="w-6 h-6 rounded-md border-outline-variant text-primary focus:ring-primary-container cursor-pointer" type="checkbox"/>
                                </div>
                                <p class="text-on-surface-variant font-body-sm mb-md line-clamp-2">${task.description || ''}</p>
                                <div class="flex items-center justify-between">
                                    <span class="font-label-sm text-label-sm text-primary flex items-center gap-xs">
                                        <span class="material-symbols-outlined text-[16px]">${isUpcoming ? 'calendar_month' : 'schedule'}</span>
                                        ${task.dueDate ? new Date(task.dueDate).toLocaleDateString() : 'No Deadline'}
                                    </span>
                                    <button onclick="deleteTask(${task.id})" class="text-error hover:text-red-700 flex items-center gap-1 font-label-sm text-label-sm">
                                        <span class="material-symbols-outlined text-[16px]">delete</span>
                                    </button>
                                </div>
                            `;

                            if (isUpcoming) {
                                upcomingList.appendChild(card);
                                upcomingCount++;
                            } else {
                                activeList.appendChild(card);
                                activeCount++;
                            }
                        }
                    });

                    document.getElementById('active-task-count').textContent = `${activeCount} TASKS`;
                    document.getElementById('upcoming-task-count').textContent = `${upcomingCount} TASKS`;
                }
            } catch(e){}
        }

        async function toggleTaskCompletion(id, completed) {
            try {
                let res;
                if (!completed) {
                    res = await fetchWithAuth(`${API_BASE_URL}/tasks/${id}/complete`, { method: 'PATCH' });
                } else {
                    res = await fetchWithAuth(`${API_BASE_URL}/tasks/${id}`, {
                        method: 'PUT',
                        body: JSON.stringify({ completed: false })
                    });
                }
                if (res.success) renderActiveTab();
            } catch(e){}
        }

        async function deleteTask(id) {
            if (confirm('Delete this task?')) {
                try {
                    const res = await fetchWithAuth(`${API_BASE_URL}/tasks/${id}`, { method: 'DELETE' });
                    if (res.success) renderActiveTab();
                } catch(e){}
            }
        }

        async function clearCompletedTasks() {
            if (confirm('Are you sure you want to clear completed tasks?')) {
                try {
                    const res = await fetchWithAuth(`${API_BASE_URL}/tasks`);
                    if (res.success && res.data) {
                        for (const task of res.data) {
                            if (task.completed) {
                                await fetchWithAuth(`${API_BASE_URL}/tasks/${task.id}`, { method: 'DELETE' });
                            }
                        }
                        renderActiveTab();
                    }
                } catch(e){}
            }
        }

        async function renderFlowsView(container) {

                <section class="mb-xl">
                    <div class="flex justify-between items-center">

            } else {
                btnNotes.className = "px-6 py-2 rounded-full font-label-sm text-label-sm text-on-surface-variant hover:bg-primary/5";
                btnJournals.className = "px-6 py-2 rounded-full font-label-sm text-label-sm bg-primary text-on-primary";

        // ==========================================
        // MODULE: ORBIT (PROFILE & GOALS)
        // ==========================================
        async function renderOrbitView(container) {
            let name = "Vedant", email = "vedant@example.com";
            try {
                const profile = await fetchWithAuth(`${API_BASE_URL}/users/profile`);
                if (profile) {
                    name = profile.fullName;
                    email = profile.email;
                }
            } catch(e){}

            container.innerHTML = `
                <section class="mb-xl">
                    <h2 class="font-headline-xl text-headline-xl text-on-surface">Orbit Controls</h2>
                    <p class="text-on-surface-variant font-body-lg">Manage your credentials, milestones, and system profile settings.</p>
                </section>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">
                    <!-- Profile Info & Password Reset -->
                    <div class="lg:col-span-6 bg-white border border-outline-variant p-lg rounded-xl ambient-shadow">
                        <h4 class="font-headline-md text-headline-md mb-md text-primary">System Profile</h4>
                        <div class="flex flex-col gap-2 mb-6 bg-surface-container-low p-4 rounded-xl">
                            <p class="font-body-md text-on-surface"><strong>Full Name:</strong> ${name}</p>
                            <p class="font-body-md text-on-surface"><strong>Email:</strong> ${email}</p>
                        </div>
                        
                        <form id="change-pwd-form" class="flex flex-col gap-4 border-t border-outline-variant pt-6">
                            <h5 class="font-label-sm text-label-sm text-primary uppercase">Change Account Password</h5>
                            <div class="flex flex-col gap-1">
                                <label class="font-label-sm text-label-sm text-on-surface-variant">CURRENT PASSWORD</label>
                                <input id="pwd-curr" type="password" required class="w-full bg-surface-container-low border border-outline-variant p-3 rounded-lg focus:border-primary focus:outline-none" />
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="font-label-sm text-label-sm text-on-surface-variant">NEW PASSWORD</label>
                                <input id="pwd-new" type="password" required class="w-full bg-surface-container-low border border-outline-variant p-3 rounded-lg focus:border-primary focus:outline-none" />
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="font-label-sm text-label-sm text-on-surface-variant">CONFIRM NEW PASSWORD</label>
                                <input id="pwd-conf" type="password" required class="w-full bg-surface-container-low border border-outline-variant p-3 rounded-lg focus:border-primary focus:outline-none" />
                            </div>
                            <button type="submit" class="bg-primary text-on-primary py-3 px-6 rounded-full font-semibold transition-all hover:opacity-90 active:scale-95 text-center mt-2">
                                Update Password
                            </button>
                        </form>
                        
                        <button onclick="performLogout()" class="w-full mt-6 bg-error-container text-on-error-container py-3 px-6 rounded-full font-semibold transition-all hover:opacity-90 active:scale-95 text-center">
                            Sign Out of Command Center
                        </button>
                    </div>

                    <!-- Goals & Milestones tracker -->
                    <div class="lg:col-span-6 bg-white border border-outline-variant p-lg rounded-xl ambient-shadow">
                        <h4 class="font-headline-md text-headline-md mb-md text-primary">Milestones & Goals</h4>
                        <div class="flex flex-col gap-4" id="goals-list"></div>
                    </div>
                </div>
            `;

            // Load goals list
            const list = document.getElementById('goals-list');
            try {
                const res = await fetchWithAuth(`${API_BASE_URL}/goals`);
                if (res.success && res.data) {
                    res.data.forEach(goal => {
                        const item = document.createElement('div');
                        item.className = `border border-outline-variant p-4 rounded-xl flex items-center justify-between ${goal.completed ? 'opacity-50' : ''}`;
                        item.innerHTML = `
                            <div>
                                <h5 class="font-body-lg font-semibold ${goal.completed ? 'line-through' : ''}">${goal.title}</h5>
                                <p class="font-body-sm text-on-surface-variant line-clamp-1">${goal.description || ''}</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="toggleGoal(${goal.id}, ${goal.completed})" class="material-symbols-outlined text-primary">
                                    ${goal.completed ? 'check_box' : 'check_box_outline_blank'}
                                </button>
                                <button onclick="deleteGoal(${goal.id})" class="material-symbols-outlined text-error">delete</button>
                            </div>
                        `;
                        list.appendChild(item);
                    });
                }
            } catch(e){}

            // Bind Change Password
            document.getElementById('change-pwd-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const currentPassword = document.getElementById('pwd-curr').value;
                const newPassword = document.getElementById('pwd-new').value;
                const confirmPassword = document.getElementById('pwd-conf').value;

                try {
                    const token = localStorage.getItem('jwt_token');
                    const res = await fetch(`${API_BASE_URL}/users/change-password`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ currentPassword, newPassword, confirmPassword })
                    });
                    if (res.status === 200) {
                        alert('Password updated successfully!');
                        renderActiveTab();
                    } else {
                        const text = await res.text();
                        alert(text || 'Password update failed.');
                    }
                } catch(err){
                    alert('Connection error.');
                }
            });
        }

        async function toggleGoal(id, completed) {
            try {
                const res = await fetchWithAuth(`${API_BASE_URL}/goals/${id}/${completed ? 'pending' : 'complete'}`, {
                    method: 'PATCH'
                });
                if (res.success) renderActiveTab();

        async function deleteGoal(id) {
            if (confirm('Delete this goal milestone?')) {
                try {
                    const res = await fetchWithAuth(`${API_BASE_URL}/goals/${id}`, { method: 'DELETE' });
                    if (res.success) renderActiveTab();

            }

        function performLogout() {
            if (confirm('Log out from LifeOS?')) {
                localStorage.removeItem('jwt_token');
                checkAuth();
            }
        }

        // ==========================================
        // QUICK CREATE SYSTEM
        // ==========================================
        function openQuickCreateModal() {
            let modal = document.getElementById('quick-create-modal');
            if (!modal) {

                modal.id = 'quick-create-modal';
                modal.className = 'fixed inset-0 bg-surface/90 backdrop-blur-2xl z-[100] flex items-center justify-center p-4';
                document.body.appendChild(modal);
            }

            modal.innerHTML = `
                <div class="bg-white border border-outline-variant p-8 max-w-md w-full rounded-2xl ambient-shadow relative">
                    <button onclick="closeQuickCreateModal()" class="absolute top-4 right-4 text-on-surface-variant hover:text-primary">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                    <h2 class="font-headline-md text-headline-md text-primary mb-4 text-center">Quick Create</h2>
                    
                    <div class="flex flex-col gap-4">
                        <div class="flex flex-col gap-1">
                            <label class="font-label-sm text-label-sm text-on-surface-variant">TYPE</label>
                            <select id="qc-type" class="w-full bg-surface-container-low border border-outline-variant p-3 rounded-lg focus:border-primary focus:outline-none">
                                <option value="task">Task</option>
                                <option value="habit">Habit</option>
                                <option value="goal">Goal Milestone</option>
                                <option value="note">Note</option>
                                <option value="journal">Journal Diary</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="font-label-sm text-label-sm text-on-surface-variant">TITLE / NAME</label>
                            <input id="qc-title" type="text" required class="w-full bg-surface-container-low border border-outline-variant p-3 rounded-lg focus:border-primary focus:outline-none" placeholder="Enter title..." />
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="font-label-sm text-label-sm text-on-surface-variant">DETAILS / DESCRIPTION</label>
                            <textarea id="qc-desc" class="w-full bg-surface-container-low border border-outline-variant p-3 rounded-lg focus:border-primary focus:outline-none" rows="3" placeholder="Enter description..."></textarea>
                        </div>
                        <button onclick="submitQuickCreate()" class="bg-primary text-on-primary py-3 px-6 rounded-full font-semibold transition-all hover:opacity-90 active:scale-95 text-center mt-2">
                            Create Item
                        </button>
                    </div>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function closeQuickCreateModal() {
            const modal = document.getElementById('quick-create-modal');
            if (modal) modal.style.display = 'none';
        }

        async function submitQuickCreate() {
            const type = document.getElementById('qc-type').value;
            const title = document.getElementById('qc-title').value;
            const desc = document.getElementById('qc-desc').value;

            if (!title) {
                alert('Title/Name is required.');
                return;
            }

            try {
                let res;
                if (type === 'task') {
                    res = await fetchWithAuth(`${API_BASE_URL}/tasks`, {
                        method: 'POST',
                        body: JSON.stringify({ title, description: desc, dueDate: new Date().toISOString() })
                    });
                } else if (type === 'habit') {
                    res = await fetchWithAuth(`${API_BASE_URL}/habits`, {
                        method: 'POST',
                        body: JSON.stringify({ name: title, description: desc, streak: 0, completedToday: false })
                    });
                } else if (type === 'goal') {
                    res = await fetchWithAuth(`${API_BASE_URL}/goals`, {
                        method: 'POST',
                        body: JSON.stringify({ title, description: desc, targetDate: new Date().toISOString(), completed: false })
                    });
                } else if (type === 'note') {
                    res = await fetchWithAuth(`${API_BASE_URL}/notes`, {
                        method: 'POST',
                        body: JSON.stringify({ title, content: desc })
                    });
                } else if (type === 'journal') {
                    res = await fetchWithAuth(`${API_BASE_URL}/journals`, {
                        method: 'POST',
                        body: JSON.stringify({ title, content: desc })
                    });
                }

                if (res.success) {
                    closeQuickCreateModal();
                    renderActiveTab();
                } else {
                    alert('Creation failed');
                }
            } catch(e){
                console.error(e);
            }
        }

        // Initialize App
        checkAuth();
    </script>
