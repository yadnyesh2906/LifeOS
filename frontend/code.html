<!-- Main Canvas -->

<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-surface/80 backdrop-blur-2xl border-t border-primary/10 shadow-[0_-8px_30px_rgba(0,0,0,0.04)] rounded-t-xl">
    <button onclick="changeTab('focus')" id="tab-btn-focus" class="flex flex-col items-center justify-center text-on-surface-variant/60 p-3 hover:text-primary transition-all active:scale-90 duration-300">

        <span class="font-label-sm text-label-sm mt-1">Tasks</span>
    </button>
    <button onclick="changeTab('flows')" id="tab-btn-flows" class="flex flex-col items-center justify-center text-on-surface-variant/60 p-3 hover:text-primary transition-all active:scale-90 duration-300">
        <span class="material-symbols-outlined" data-icon="rebase_edit">rebase_edit</span>
        <span class="font-label-sm text-label-sm mt-1">Vault</span>
    </button>

        <span class="material-symbols-outlined" data-icon="flag">flag</span>
        <span class="font-label-sm text-label-sm mt-1">Goals</span>
    </button>
    <button onclick="changeTab('insights')" id="tab-btn-insights" class="flex flex-col items-center justify-center text-on-surface-variant/60 p-3 hover:text-primary transition-all active:scale-90 duration-300">

<script>
    // Global API Configuration
    const API_BASE_URL = 'http://localhost:8081/api';
    let currentTab = 'tasks';

    // Check Authentication
    function checkAuth() {
        const token = localStorage.getItem('jwt_token');
        if (!token) {
            showAuthModal();
        } else {
            hideAuthModal();
            renderActiveTab();
        }
    }

    // Auth Overlay Modal
    function showAuthModal() {
        let modal = document.getElementById('auth-modal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'auth-modal';
            modal.className = 'fixed inset-0 bg-surface/90 backdrop-blur-2xl z-[100] flex items-center justify-center p-4';
            modal.innerHTML = `
                <div class="glass-card max-w-md w-full p-8 rounded-3xl border border-primary/20 shadow-2xl">
                    <h2 class="font-headline-md text-headline-md text-primary mb-2 text-center" id="auth-title">Welcome to LifeOS</h2>
                    <p class="font-body-md text-on-surface-variant text-center mb-6" id="auth-subtitle">Login to access your workspace</p>
                    
                    <form id="auth-form" class="flex flex-col gap-4">
                        <div class="flex flex-col gap-1" id="fullname-container" style="display: none;">
                            <label class="font-label-sm text-label-sm text-on-surface-variant">FULL NAME</label>
                            <input id="auth-fullname" type="text" class="w-full bg-surface-container-low border border-outline/20 p-3 rounded-xl focus:border-primary focus:outline-none" placeholder="Jane Doe" />
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="font-label-sm text-label-sm text-on-surface-variant">EMAIL ADDRESS</label>
                            <input id="auth-email" type="email" required class="w-full bg-surface-container-low border border-outline/20 p-3 rounded-xl focus:border-primary focus:outline-none" placeholder="name@example.com" />
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="font-label-sm text-label-sm text-on-surface-variant">PASSWORD</label>
                            <input id="auth-password" type="password" required class="w-full bg-surface-container-low border border-outline/20 p-3 rounded-xl focus:border-primary focus:outline-none" placeholder="••••••••" />
                        </div>
                        <button type="submit" class="bg-primary text-on-primary font-label-sm py-3 px-6 rounded-full font-semibold transition-all hover:opacity-90 active:scale-95 glow-active mt-2">
                            Continue
                        </button>
                    </form>
                    
                    <p class="text-center font-label-sm text-on-surface-variant mt-6">
                        <span id="auth-toggle-text">New to LifeOS?</span>
                        <button id="auth-toggle-btn" class="text-primary font-semibold hover:underline">Create an account</button>
                    </p>
                </div>
            `;
            document.body.appendChild(modal);

            let isLogin = true;
            const toggleBtn = document.getElementById('auth-toggle-btn');
            toggleBtn.addEventListener('click', () => {
                isLogin = !isLogin;
                document.getElementById('fullname-container').style.display = isLogin ? 'none' : 'flex';
                document.getElementById('auth-title').textContent = isLogin ? 'Welcome to LifeOS' : 'Create Account';
                document.getElementById('auth-subtitle').textContent = isLogin ? 'Login to access your workspace' : 'Get started for free';
                toggleBtn.textContent = isLogin ? 'Create an account' : 'Login';
                document.getElementById('auth-toggle-text').textContent = isLogin ? 'New to LifeOS?' : 'Already have an account?';
            });

            document.getElementById('auth-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-password').value;

                if (isLogin) {
                    try {
                        const res = await fetch(`${API_BASE_URL}/auth/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password })
                        });
                        const result = await res.json();
                        if (result.success) {
                            localStorage.setItem('jwt_token', result.data.token);
                            checkAuth();
                        } else {
                            alert(result.message || 'Login failed');
                        }
                    } catch (err) {
                        alert('Server connection error.');
                    }
                } else {
                    const fullName = document.getElementById('auth-fullname').value;
                    try {
                        const res = await fetch(`${API_BASE_URL}/auth/register`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ fullName, email, password })
                        });
                        const result = await res.json();
                        if (result.success) {
                            alert('Registration successful! Please login.');
                            toggleBtn.click();
                        } else {
                            alert(result.message || 'Registration failed');
                        }
                    } catch (err) {
                        alert('Server connection error.');
                    }
                }
            });
        }
        modal.style.display = 'flex';
    }

    function hideAuthModal() {
        const modal = document.getElementById('auth-modal');
        if (modal) modal.style.display = 'none';
    }

    // Helper: Authenticated request fetcher
    async function fetchWithAuth(url, options = {}) {
        const token = localStorage.getItem('jwt_token');
        const headers = {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
            ...options.headers
        };
        const response = await fetch(url, { ...options, headers });
        if (response.status === 401) {
            localStorage.removeItem('jwt_token');
            checkAuth();
            throw new Error('Unauthorized');
        }
        return response.json();
    }

    // Switch Navigation Tab
    function changeTab(tabName) {
        currentTab = tabName;
        renderActiveTab();
    }

    // Render active tab view
    async function renderActiveTab() {
        // Toggle Nav Bar classes
        const tabs = ['focus', 'tasks', 'flows', 'goals', 'insights'];
        tabs.forEach(t => {
            const btn = document.getElementById(`tab-btn-${t}`);
            if (btn) {
                if (t === currentTab) {
                    btn.className = "flex flex-col items-center justify-center bg-primary-container/20 text-primary rounded-full p-3 ring-1 ring-primary/20 active:scale-90 transition-all";
                } else {
                    btn.className = "flex flex-col items-center justify-center text-on-surface-variant/60 p-3 hover:text-primary transition-all active:scale-90 duration-300";
                }
            }
        });

        const mainContent = document.getElementById('main-content');
        if (!mainContent) return;

        // Render loading state
        mainContent.innerHTML = `
            <div class="flex items-center justify-center py-20">
                <p class="font-headline-md text-primary animate-pulse">Loading Workspace Module...</p>
            </div>
        `;

        try {
            if (currentTab === 'tasks') {
                await renderTasksView(mainContent);
            } else if (currentTab === 'focus') {
                await renderFocusView(mainContent);
            } else if (currentTab === 'flows') {
                await renderFlowsView(mainContent);
            } else if (currentTab === 'goals') {
                await renderGoalsView(mainContent);
            } else if (currentTab === 'insights') {
                await renderInsightsView(mainContent);
            }
        } catch (err) {
            mainContent.innerHTML = `<p class="text-error text-center py-10">Error loading tab content.</p>`;
        }
    }

    // ==========================================
    // MODULE: TASKS VIEW
    // ==========================================
    async function renderTasksView(container) {
        let total = 0, completed = 0, percentage = 0;
        try {
            const dashboardRes = await fetchWithAuth(`${API_BASE_URL}/dashboard`);
            if (dashboardRes.success && dashboardRes.data) {
                total = dashboardRes.data.totalTasks || 0;
                completed = dashboardRes.data.completedTasks || 0;
                percentage = total > 0 ? Math.round((completed / total) * 100) : 0;
            }
        } catch(e){}

        container.innerHTML = `
            <section class="mb-8">
                <p class="font-label-sm text-label-sm text-primary uppercase tracking-widest mb-1">Intelligence Overview</p>
                <h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">Optimize your focus.</h2>
            </section>
            
            <div class="flex flex-col gap-6 mb-8">
                <div class="relative w-full group">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-outline material-symbols-outlined transition-colors group-focus-within:text-primary">search</span>
                    <input class="w-full bg-surface-container-low border-b border-outline/20 py-4 pl-12 pr-4 rounded-xl focus:outline-none focus:border-primary transition-all font-body-md text-body-md placeholder:text-outline/50" placeholder="Search tasks, priorities..." type="text"/>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter" id="tasks-grid">
                <!-- Task Cards will render here -->
                
                <!-- Add Task CTA -->
                <div onclick="createNewTask()" class="glass-card rounded-3xl p-8 border-dashed border-2 flex flex-col items-center justify-center min-h-[220px] cursor-pointer hover:bg-primary/5 transition-all group">
                    <div class="w-16 h-16 rounded-full bg-primary-container/10 flex items-center justify-center text-primary mb-4 group-hover:scale-110 transition-transform">
                        <span class="material-symbols-outlined text-[32px]">add</span>
                    </div>
                    <span class="font-headline-md text-headline-md text-primary">Add New Task</span>
                    <p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Create a custom scheduled task</p>
                </div>

                <!-- Stats card -->
                <div class="glass-card rounded-3xl p-8 md:col-span-2 lg:col-span-2 flex flex-col md:flex-row gap-8 items-center bg-gradient-to-br from-primary/5 to-secondary/5">
                    <div class="flex-1">
                        <h3 class="font-headline-md text-headline-md text-on-surface mb-2">Weekly Momentum</h3>
                        <p class="font-body-md text-body-md text-on-surface-variant mb-6">You've completed ${percentage}% of your high-impact tasks (${completed}/${total} tasks).</p>
                        <div class="flex gap-4">
                            <div class="bg-surface/80 px-4 py-3 rounded-2xl border border-primary/10">
                                <p class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-1">Focus Score</p>
                                <p class="font-headline-md text-headline-md text-primary">92/100</p>
                            </div>
                        </div>
                    </div>
                    <div class="relative w-40 h-40 flex items-center justify-center">
                        <svg class="w-full h-full transform -rotate-90">
                            <circle class="text-primary/10" cx="80" cy="80" fill="transparent" r="70" stroke="currentColor" stroke-width="12"></circle>
                            <circle class="text-primary" cx="80" cy="80" fill="transparent" r="70" stroke="currentColor" stroke-dasharray="440" stroke-dashoffset="${440 - (percentage/100)*440}" stroke-linecap="round" stroke-width="12"></circle>
                        </svg>
                        <div class="absolute flex flex-col items-center">
                            <span class="font-headline-md text-headline-md text-on-surface">${percentage}%</span>
                        </div>
                    </div>
                </div>
            </div>
        `;

        const grid = document.getElementById('tasks-grid');
        const tasksRes = await fetchWithAuth(`${API_BASE_URL}/tasks`);
        if (tasksRes.success && tasksRes.data) {
            tasksRes.data.forEach(task => {
                const card = document.createElement('div');
                card.className = `glass-card rounded-3xl p-8 flex flex-col justify-between min-h-[220px] transition-all duration-300 ${task.completed ? 'opacity-50 line-through' : ''}`;
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-3 py-1 ${task.completed ? 'bg-surface-container-high text-on-surface-variant' : 'bg-error-container text-on-error-container'} rounded-full font-label-sm text-label-sm">
                                ${task.completed ? 'Completed' : 'Active'}
                            </span>
                            <span class="text-on-surface-variant font-label-sm text-label-sm">
                                ${task.dueDate ? new Date(task.dueDate).toLocaleDateString() : 'No Due Date'}
                            </span>
                        </div>
                        <h3 class="font-headline-md text-headline-md text-on-surface mb-2">${task.title}</h3>
                        <p class="font-body-md text-body-md text-on-surface-variant line-clamp-2">${task.description || ''}</p>
                    </div>
                    <div class="mt-6 flex items-center justify-between">
                        <button onclick="deleteTask(${task.id})" class="text-error hover:text-red-700 flex items-center gap-1 font-label-sm text-label-sm">
                            <span class="material-symbols-outlined text-[18px]">delete</span> Delete
                        </button>
                        <button onclick="toggleTaskCompletion(${task.id}, ${task.completed})" class="w-10 h-10 rounded-full border border-primary/20 flex items-center justify-center text-primary hover:bg-primary hover:text-white transition-all">
                            <span class="material-symbols-outlined">${task.completed ? 'undo' : 'check'}</span>
                        </button>
                    </div>
                `;
                grid.insertBefore(card, grid.firstChild);
            });
        }
    }

    async function createNewTask() {
        const title = prompt("Enter Task Title:");
        if (!title) return;
        const description = prompt("Enter Description:");
        try {
            const res = await fetchWithAuth(`${API_BASE_URL}/tasks`, {
                method: 'POST',
                body: JSON.stringify({ title, description, dueDate: new Date().toISOString() })
            });
            if (res.success) renderActiveTab();
        } catch(e){}
    }

    async function toggleTaskCompletion(id, completed) {
        try {
            let res;
            if (!completed) {
                res = await fetchWithAuth(`${API_BASE_URL}/tasks/${id}/complete`, { method: 'PATCH' });
            } else {
                res = await fetchWithAuth(`${API_BASE_URL}/tasks/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ completed: false })
                });
            }
            if (res.success) renderActiveTab();
        } catch(e){}
    }

    async function deleteTask(id) {
        if (confirm('Delete this task?')) {
            try {
                const res = await fetchWithAuth(`${API_BASE_URL}/tasks/${id}`, { method: 'DELETE' });
                if (res.success) renderActiveTab();
            } catch(e){}
        }
    }

    // ==========================================
    // MODULE: FOCUS (HABITS) VIEW
    // ==========================================
    async function renderFocusView(container) {
        container.innerHTML = `
            <section class="mb-8">
                <p class="font-label-sm text-label-sm text-primary uppercase tracking-widest mb-1">Streaks & Routines</p>
                <h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">Build Daily Habits.</h2>
            </section>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter" id="habits-grid">
                <!-- Habits render here -->
                
                <div onclick="createNewHabit()" class="glass-card rounded-3xl p-8 border-dashed border-2 flex flex-col items-center justify-center min-h-[220px] cursor-pointer hover:bg-primary/5 transition-all group">

    // Open User Profile & Settings Modal
    async function openProfileModal() {
        let modal = document.getElementById('profile-modal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'profile-modal';
            modal.className = 'fixed inset-0 bg-surface/90 backdrop-blur-2xl z-[100] flex items-center justify-center p-4';
            document.body.appendChild(modal);
        }

        // Fetch profile (Note: UserController returns data directly, not wrapped in ApiResponse)
        let name = "User", email = "";
        try {
            const userProfile = await fetchWithAuth(`${API_BASE_URL}/users/profile`);
            if (userProfile) {
                name = userProfile.fullName || "User";
                email = userProfile.email || "";
            }
        } catch (err) {
            console.error("Error loading user profile", err);
        }

        modal.innerHTML = `
            <div class="glass-card max-w-md w-full p-8 rounded-3xl border border-primary/20 shadow-2xl relative">
                <button onclick="closeProfileModal()" class="absolute top-4 right-4 text-on-surface-variant hover:text-primary">
                    <span class="material-symbols-outlined">close</span>
                </button>
                <h2 class="font-headline-md text-headline-md text-primary mb-4 text-center">Profile Settings</h2>
                
                <div class="flex flex-col gap-3 mb-6 bg-surface-container-low p-4 rounded-2xl border border-primary/10">
                    <p class="font-body-md text-on-surface"><strong>Name:</strong> ${name}</p>
                    <p class="font-body-md text-on-surface"><strong>Email:</strong> ${email}</p>
                </div>
                
                <form id="change-password-form" class="flex flex-col gap-4 border-t border-primary/10 pt-4">
                    <h3 class="font-label-sm text-label-sm text-primary uppercase tracking-widest">Update Password</h3>
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-label-sm text-on-surface-variant">CURRENT PASSWORD</label>
                        <input id="pwd-current" type="password" required class="w-full bg-surface-container-low border border-outline/20 p-3 rounded-xl focus:border-primary focus:outline-none" />
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-label-sm text-on-surface-variant">NEW PASSWORD</label>
                        <input id="pwd-new" type="password" required class="w-full bg-surface-container-low border border-outline/20 p-3 rounded-xl focus:border-primary focus:outline-none" />
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-label-sm text-on-surface-variant">CONFIRM PASSWORD</label>
                        <input id="pwd-confirm" type="password" required class="w-full bg-surface-container-low border border-outline/20 p-3 rounded-xl focus:border-primary focus:outline-none" />
                    </div>
                    <button type="submit" class="bg-primary text-on-primary font-label-sm py-3 px-6 rounded-full font-semibold transition-all hover:opacity-90 active:scale-95 glow-active">
                        Change Password
                    </button>
                </form>
                
                <button onclick="logout()" class="w-full mt-6 bg-error-container text-on-error-container font-label-sm py-3 px-6 rounded-full font-semibold transition-all hover:opacity-90 active:scale-95 text-center">
                    Logout Account
                </button>
            </div>
        `;
        modal.style.display = 'flex';

        // Bind Change Password submit
        document.getElementById('change-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentPassword = document.getElementById('pwd-current').value;
            const newPassword = document.getElementById('pwd-new').value;
            const confirmPassword = document.getElementById('pwd-confirm').value;

            try {
                // UserController change-password expects raw response text or standard response entity
                const token = localStorage.getItem('jwt_token');
                const res = await fetch(`${API_BASE_URL}/users/change-password`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ currentPassword, newPassword, confirmPassword })
                });

                if (res.status === 200) {
                    alert('Password changed successfully!');
                    closeProfileModal();
                } else {
                    const text = await res.text();
                    alert(text || 'Failed to change password. Make sure current password is correct.');
                }
            } catch (err) {
                alert('Connection error.');
            }
        });
    }

    function closeProfileModal() {
        const modal = document.getElementById('profile-modal');
        if (modal) modal.style.display = 'none';
    }

    function logout() {
        if (confirm('Do you want to log out?')) {
            localStorage.removeItem('jwt_token');
            closeProfileModal();
            checkAuth();
        }
    }

    // Initialize App
    checkAuth();
</script>
